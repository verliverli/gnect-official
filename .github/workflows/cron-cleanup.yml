name: GNECT Cron Cleanup

on:
  schedule:
    # Run every hour at minute 0
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger GNECT Cleanup
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://gnect.vercel.app/api/cron/cleanup")

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Cleanup triggered successfully (HTTP $HTTP_STATUS)"
          else
            echo "❌ Cleanup failed (HTTP $HTTP_STATUS)"
            exit 1
          fi

      - name: Trigger GNECT Cleanup (with response body)
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://gnect.vercel.app/api/cron/cleanup")
          echo "Response: $RESPONSE"
